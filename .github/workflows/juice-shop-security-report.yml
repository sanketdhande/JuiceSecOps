name: juice-shop-security-report

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install semgrep

      - name: Prepare workspace
        run: |
          mkdir -p results/ci
          chmod 777 results/ci

      - name: Clone Juice Shop target
        run: ./scripts/fetch_juice_shop.sh

      - name: Run Semgrep
        run: semgrep --config p/owasp-top-ten --json --output results/ci/semgrep.json targets/juice-shop

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: targets/juice-shop
          format: json
          output: results/ci/trivy.json
          scanners: vuln,secret
          exit-code: 0

      - name: Start Juice Shop
        run: |
          docker network create juice-shop-net || true
          docker run -d --name thesis-juice-shop --network juice-shop-net -p 3000:3000 bkimminich/juice-shop

      - name: Run ZAP baseline
        run: |
          chmod 777 results/ci
          docker run --rm \
            --network juice-shop-net \
            -v "$PWD/results/ci:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://thesis-juice-shop:3000 -J zap.json 2>&1 | tee results/ci/zap-baseline.log || true
          echo "Contents of results/ci after ZAP:"
          ls -la results/ci || true

      - name: Run thesis security gate
        run: |
          if [ -f results/ci/zap.json ]; then
            ZAP_INPUT="--input results/ci/zap.json"
          else
            echo "ZAP report missing, continuing without ZAP input"
            ZAP_INPUT=""
          fi
          python -m juicesecops \
            --input results/ci/semgrep.json \
            --input results/ci/trivy.json \
            $ZAP_INPUT \
            --provider heuristic \
            --target-repo targets/juice-shop \
            --output results/ci

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: juice-shop-security-report
          path: results/ci

      - name: Clean up
        if: always()
        run: |
          docker rm -f thesis-juice-shop || true
          docker network rm juice-shop-net || true
